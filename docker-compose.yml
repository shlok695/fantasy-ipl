services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fantasy-ipl:latest
    container_name: fantasy-ipl
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://localhost:3000/ipl
      NEXT_PUBLIC_BASE_PATH: /ipl
      INTERNAL_APP_URL: http://app:3000
    volumes:
      - ./prisma:/app/prisma
    restart: unless-stopped

  sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: fantasy-ipl:latest
    command: ["node", "scripts/worker.js"]
    env_file:
      - .env
    environment:
      INTERNAL_APP_URL: http://app:3000
      NEXT_PUBLIC_BASE_PATH: /ipl
    depends_on:
      - app
    restart: unless-stopped
